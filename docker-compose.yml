services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: grademind
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: grademind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://grademind:password123@db:5432/grademind
      SECRET_KEY: "change_me_in_production"
      DEBUG: "True"
      PROJECT_NAME: "GradeMIND Backend"
      PROJECT_VERSION: "1.0.0"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      AUTH_ENABLED: "False"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    volumes:
      - backend_storage:/app/backend/storage
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_storage:
